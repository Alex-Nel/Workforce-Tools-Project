version: '3.8'

services:
  app:
    build: .
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=db
      - DB_NAME=tasks_db
      - DB_USER=admin
      - DB_PASS=secret123
    depends_on:
      db:
        condition: service_healthy
    networks:
      - task-network

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=tasks_db
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=secret123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      # Use the user defined in POSTGRES_USER
      test: ["CMD-SHELL", "pg_isready -U admin -d tasks_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - task-network

networks:
  task-network:
    driver: bridge

volumes:
  postgres_data:
